# ============================================
# PRODUCTIE CONFIGURATIE
# ============================================

# ============================================
# SCHEMA VALIDATIE
# ============================================
spring.jpa.hibernate.ddl-auto=validate

# ============================================
# DATABASECONFIGURATIE
# ============================================
spring.datasource.url=jdbc:postgresql://PROD_HOST:5432/securechat_db
spring.datasource.username=securechat_user
spring.datasource.password=WIJZIG_MIJ_NAAR_STERK_WACHTWOORD

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ============================================
# JPA CONFIGURATIE
# ============================================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ============================================
# DATAGEINITIALISATIE
# ============================================
spring.sql.init.mode=never

# ============================================
# LOGGING
# ============================================
logging.level.com.securechat=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ============================================
# BEVEILIGING
# ============================================
keycloak.auth-server-url=https://PROD_KEYCLOAK_HOST
keycloak.realm=SecureChat
keycloak.resource=securechat-backend
keycloak.public-client=false
keycloak.ssl-required=all

# ============================================
# MANAGEMENT & MONITORING
# ============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
server.shutdown=graceful
server.error.include-stacktrace=never

# ============================================
# TRANSACTIES
# ============================================
spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true