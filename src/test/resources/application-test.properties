# ============================================
# H2 DATABASE (ALLEEN TESTS)
# ============================================
# Test profiel gebruikt H2 in-memory database met Flyway migration ondersteuning
# Schema wordt aangemaakt door Hibernate uit JPA entities (ddl-auto=create-drop)
# data.sql wordt NIET geladen voor tests (spring.sql.init.mode=never)
# Dit voorkomt PostgreSQL-specifieke SQL syntaxisfouten in H2 tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Schemacreatie voor tests: create-drop maakt vers schema per test
# GEBRUIK NIET validate hier omdat test profiel Hibernate DDL gebruikt, niet Flyway migraties
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Schakel data.sql uit voor tests - H2 kan PostgreSQL ON CONFLICT syntaxis niet verwerken
spring.sql.init.mode=never

server.port=0